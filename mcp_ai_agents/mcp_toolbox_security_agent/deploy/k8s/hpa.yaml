# Toolbox scales horizontally; connection pooling is built in per replica.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: toolbox
  namespace: groceries
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: toolbox
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
