# Workload Identity (security mechanism #7).
# This Kubernetes ServiceAccount is bound to a Google service account, so Toolbox
# authenticates to Cloud SQL / AlloyDB via IAM — there is NO database password in
# the cluster at all. Bind it once:
#
#   gcloud iam service-accounts add-iam-policy-binding \
#     toolbox-gsa@PROJECT.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:PROJECT.svc.id.goog[groceries/toolbox-sa]"
#
#   gcloud projects add-iam-policy-binding PROJECT \
#     --member serviceAccount:toolbox-gsa@PROJECT.iam.gserviceaccount.com \
#     --role roles/cloudsql.client
#
# The GSA also needs an IAM database user on the instance, granted only the
# least-privilege role(s) from db/postgres/01_roles.sql.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: toolbox-sa
  namespace: groceries
  annotations:
    iam.gke.io/gcp-service-account: toolbox-gsa@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-web-sa
  namespace: groceries
  annotations:
    # For Vertex AI (Gemini) via ADC instead of an API key.
    iam.gke.io/gcp-service-account: agent-web-gsa@PROJECT_ID.iam.gserviceaccount.com
