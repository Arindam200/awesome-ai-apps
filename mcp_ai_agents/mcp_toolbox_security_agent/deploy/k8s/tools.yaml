# =============================================================================
# MCP Toolbox tools.yaml — GKE / PRODUCTION variant
# =============================================================================
# IDENTICAL to toolbox/tools.yaml EXCEPT the `sources:` block below: here the
# Postgres sources use kind: cloud-sql-postgres with the user/password OMITTED,
# so Toolbox authenticates via IAM / Workload Identity (mechanism #7) — there is
# NO database password anywhere in the cluster.
#
# Create the Secret Toolbox mounts from this file:
#   kubectl -n groceries create secret generic toolbox-tools \
#     --from-file=tools.yaml=deploy/k8s/tools.yaml
#
# (To keep this in lockstep with the local file, it is generated by swapping only
#  the sources block; everything from AUTH SERVICES down is identical.)
# =============================================================================

sources:
  # Customer transactional source — Cloud SQL via IAM (least-priv IAM DB user).
  pg-app:
    kind: cloud-sql-postgres
    project: ${PG_PROJECT}
    region: ${PG_REGION}
    instance: ${PG_INSTANCE}
    database: ${PG_DATABASE}
    user: ${PG_APP_IAM_USER}      # IAM DB user; NO password -> IAM/ADC auth
    ipType: private

  # Admin source — a SEPARATE IAM DB user mapped to the toolbox_admin role.
  pg-admin:
    kind: cloud-sql-postgres
    project: ${PG_PROJECT}
    region: ${PG_REGION}
    instance: ${PG_INSTANCE}
    database: ${PG_DATABASE}
    user: ${PG_ADMIN_IAM_USER}    # IAM DB user; NO password
    ipType: private

  mongo-catalog:
    kind: mongodb
    uri: ${MONGO_URI}

# -----------------------------------------------------------------------------
# AUTH SERVICES — OIDC providers (mechanisms #2 & #3).
# `generic` auto-discovers /.well-known/openid-configuration at authorizationServer,
# caches the JWKS, and validates the token's issuer + audience. This is what lets
# a local Keycloak (or any OIDC IdP) be the identity source.
#
# PRODUCTION SWAP to Google Sign-In (no other change needed):
#   keycloak:
#     kind: google
#     clientId: <YOUR_GOOGLE_OAUTH_CLIENT_ID>
# ...then the agent fetches a Google ID token instead of a Keycloak token.
# (Avoid writing the dollar-brace ENV syntax in comments — Toolbox substitutes
#  env vars across the whole file, including commented lines.)
# -----------------------------------------------------------------------------
authServices:
  # Customer identity. Every customer token must carry audience `grocery-agent`.
  keycloak:
    kind: generic
    authorizationServer: ${OIDC_ISSUER}        # e.g. http://keycloak:8080/realms/grocery
    audience: ${OIDC_AUDIENCE:grocery-agent}

  # Admin identity (mechanism #3). Only Keycloak admin users receive a token with
  # audience `grocery-admin`, so authRequired:[keycloak_admin] is true admin gating
  # — not merely "any valid login".
  keycloak_admin:
    kind: generic
    authorizationServer: ${OIDC_ISSUER}
    audience: ${OIDC_ADMIN_AUDIENCE:grocery-admin}

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:

  # === CUSTOMER TOOLS =========================================================

  # Semantic product discovery. Public/read-only (browsing needs no login).
  # The vector index + field path are HARDCODED here (they used to be supplied by
  # the agent) so the model cannot redirect the search at an arbitrary index.
  semantic_product_search:
    kind: mongodb-aggregate
    source: mongo-catalog
    description: >-
      Find grocery products semantically similar to a query embedding. Returns
      product name, category, brand, rating and SKU. Use this before adding to cart.
    database: grocery_store
    collection: inventory
    readOnly: true
    pipelinePayload: |
      [
        {
          "$vectorSearch": {
            "index": "vector_index",
            "path": "gemini_embedding",
            "queryVector": {{ json .embedding }},
            "numCandidates": 100,
            "limit": 10
          }
        },
        {
          "$project": { "_id": 0, "gemini_embedding": 0 }
        }
      ]
    pipelineParams:
      - name: embedding
        type: array
        description: 3072-dimension Gemini embedding of the user's search query.
        items:
          name: component
          type: float
          description: A single component of the embedding vector.

  # Authoritative price/stock for a SKU (Postgres is the system of record).
  # store_region is an SDK-BOUND parameter (mechanism #4): the application fixes
  # it, the model never sees or sets it.
  get_product_details:
    kind: postgres-sql
    source: pg-app
    description: Get the authoritative price, stock and details for a product by its SKU.
    statement: |
      SELECT sku, name, category, brand, price, stock_qty
      FROM products
      WHERE sku = $1 AND active = TRUE AND store_region = $2;
    parameters:
      - name: sku
        type: string
        description: The product SKU to look up.
      - name: store_region
        type: string
        description: Store region. Bound by the application; not chosen by the model.

  # View the CURRENT user's open cart. `username` is an AUTHENTICATED PARAMETER
  # (mechanism #2): it is populated from the verified OIDC token's
  # preferred_username claim and is REMOVED from the schema the model sees. The
  # agent literally cannot request anyone's cart — not even by naming a user.
  view_cart:
    kind: postgres-sql
    source: pg-app
    description: View the items in the current user's open shopping cart.
    statement: |
      SELECT ci.product_id, p.name, ci.quantity, ci.unit_price,
             (ci.quantity * ci.unit_price) AS line_total
      FROM carts c
      JOIN users u       ON u.id = c.user_id
      JOIN cart_items ci ON ci.cart_id = c.id
      JOIN products p    ON p.id = ci.product_id
      WHERE u.username = $1 AND c.status = 'open'
      ORDER BY p.name;
    parameters:
      - name: username
        type: string
        description: Auto-populated from the verified login token. Not model-supplied.
        authServices:
          - name: keycloak
            field: preferred_username

  # Add a product (by SKU) to the current user's open cart. Gets-or-creates the
  # open cart, then upserts the line. The price is read FROM THE DATABASE
  # ($prod.price), never from the model, so the LLM cannot invent a price.
  add_to_cart:
    kind: postgres-sql
    source: pg-app
    description: Add a quantity of a product (by SKU) to the current user's cart.
    statement: |
      WITH me AS (
        SELECT id FROM users WHERE username = $1
      ),
      ensure_cart AS (
        INSERT INTO carts (user_id, status, store_region)
        SELECT id, 'open', $3 FROM me
        ON CONFLICT (user_id) WHERE status = 'open' DO NOTHING
        RETURNING id
      ),
      cart AS (
        SELECT id FROM ensure_cart
        UNION ALL
        SELECT c.id FROM carts c JOIN me ON me.id = c.user_id WHERE c.status = 'open'
        LIMIT 1
      ),
      prod AS (
        SELECT id, price FROM products
        WHERE sku = $2 AND active = TRUE AND store_region = $3
      )
      INSERT INTO cart_items (cart_id, product_id, quantity, unit_price)
      SELECT cart.id, prod.id, $4, prod.price
      FROM cart, prod
      ON CONFLICT (cart_id, product_id)
        DO UPDATE SET quantity = cart_items.quantity + EXCLUDED.quantity
      RETURNING product_id, quantity, unit_price;
    parameters:
      - name: username
        type: string
        description: Auto-populated from the verified login token. Not model-supplied.
        authServices:
          - name: keycloak
            field: preferred_username
      - name: sku
        type: string
        description: The product SKU to add.
      - name: store_region
        type: string
        description: Store region. Bound by the application; not chosen by the model.
      - name: quantity
        type: integer
        description: How many units to add (1 or more).

  # Remove a product from the current user's open cart.
  remove_from_cart:
    kind: postgres-sql
    source: pg-app
    description: Remove a product (by SKU) from the current user's open cart.
    statement: |
      DELETE FROM cart_items ci
      USING carts c, users u, products p
      WHERE ci.cart_id = c.id
        AND c.user_id = u.id
        AND ci.product_id = p.id
        AND c.status = 'open'
        AND u.username = $1
        AND p.sku = $2
      RETURNING ci.product_id;
    parameters:
      - name: username
        type: string
        description: Auto-populated from the verified login token. Not model-supplied.
        authServices:
          - name: keycloak
            field: preferred_username
      - name: sku
        type: string
        description: The product SKU to remove.

  # Convert the current user's open cart into a placed order. The order TOTAL is
  # computed server-side by summing the cart; the model cannot set it.
  checkout:
    kind: postgres-sql
    source: pg-app
    description: Place an order from the current user's open cart and return the order id and total.
    statement: |
      WITH me AS (
        SELECT id FROM users WHERE username = $1
      ),
      c AS (
        SELECT id, store_region FROM carts
        WHERE user_id = (SELECT id FROM me) AND status = 'open'
      ),
      ord AS (
        INSERT INTO orders (user_id, total, store_region)
        SELECT (SELECT id FROM me),
               COALESCE((SELECT SUM(ci.quantity * ci.unit_price)
                         FROM cart_items ci WHERE ci.cart_id = (SELECT id FROM c)), 0),
               (SELECT store_region FROM c)
        RETURNING id, total
      ),
      items AS (
        INSERT INTO order_items (order_id, product_id, name, quantity, unit_price)
        SELECT (SELECT id FROM ord), ci.product_id, p.name, ci.quantity, ci.unit_price
        FROM cart_items ci JOIN products p ON p.id = ci.product_id
        WHERE ci.cart_id = (SELECT id FROM c)
        RETURNING 1
      ),
      close_cart AS (
        UPDATE carts SET status = 'checked_out' WHERE id = (SELECT id FROM c) RETURNING 1
      )
      SELECT (SELECT id FROM ord) AS order_id, (SELECT total FROM ord) AS total;
    parameters:
      - name: username
        type: string
        description: Auto-populated from the verified login token. Not model-supplied.
        authServices:
          - name: keycloak
            field: preferred_username

  # List the current user's orders.
  list_my_orders:
    kind: postgres-sql
    source: pg-app
    description: List the current user's past orders (most recent first).
    statement: |
      SELECT o.id, o.total, o.status, o.placed_at
      FROM orders o JOIN users u ON u.id = o.user_id
      WHERE u.username = $1
      ORDER BY o.placed_at DESC;
    parameters:
      - name: username
        type: string
        description: Auto-populated from the verified login token. Not model-supplied.
        authServices:
          - name: keycloak
            field: preferred_username

  # Get line items for ONE of the current user's orders. Ownership is enforced in
  # the WHERE clause against the AUTHENTICATED username: asking for another user's
  # order_id simply returns zero rows. This is the on-stage "blocked" moment.
  get_order_details:
    kind: postgres-sql
    source: pg-app
    description: Get the line items for one of the current user's orders, by order id.
    statement: |
      SELECT oi.name, oi.quantity, oi.unit_price
      FROM orders o
      JOIN users u        ON u.id = o.user_id
      JOIN order_items oi ON oi.order_id = o.id
      WHERE o.id = $1 AND u.username = $2;
    parameters:
      - name: order_id
        type: integer
        description: The order id to fetch.
      - name: username
        type: string
        description: Auto-populated from the verified login token. Not model-supplied.
        authServices:
          - name: keycloak
            field: preferred_username

  # === ADMIN TOOLS (authRequired — mechanism #3) ==============================
  # These run against the pg-admin source (role toolbox_admin) AND require a token
  # whose audience is grocery-admin. They live only in the admin-toolset, so the
  # customer agent cannot even name them.

  update_inventory:
    kind: postgres-sql
    source: pg-admin
    authRequired:
      - keycloak_admin
    description: (Admin) Set the stock quantity for a product by SKU.
    statement: |
      UPDATE products SET stock_qty = $1 WHERE sku = $2
      RETURNING sku, stock_qty;
    parameters:
      - name: stock_qty
        type: integer
        description: The new stock quantity.
      - name: sku
        type: string
        description: The product SKU to update.

  view_all_orders:
    kind: postgres-sql
    source: pg-admin
    authRequired:
      - keycloak_admin
    description: (Admin) View all orders across every customer.
    statement: |
      SELECT o.id, u.username, o.total, o.status, o.placed_at
      FROM orders o JOIN users u ON u.id = o.user_id
      ORDER BY o.placed_at DESC;
    parameters: []

# -----------------------------------------------------------------------------
# TOOLSETS — the customer agent loads ONLY customer-toolset, so the admin tools
# are not even present in its tool list.
# -----------------------------------------------------------------------------
toolsets:
  customer-toolset:
    - semantic_product_search
    - get_product_details
    - view_cart
    - add_to_cart
    - remove_from_cart
    - checkout
    - list_my_orders
    - get_order_details
  admin-toolset:
    - view_all_orders
    - update_inventory
    - view_cart
