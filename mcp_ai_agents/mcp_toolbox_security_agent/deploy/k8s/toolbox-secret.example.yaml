# Non-IAM configuration for Toolbox. In a real cluster, source these from Google
# Secret Manager via the Secret Manager CSI driver or External Secrets Operator
# (mechanism #8) rather than a literal Secret.
#
# IMPORTANT: with Workload Identity + Cloud SQL/AlloyDB IAM auth, there are NO
# Postgres passwords here — only the Mongo URI and the OIDC issuer. The Postgres
# source in the GKE tools.yaml uses `kind: cloud-sql-postgres` with the user/
# password fields OMITTED (see deploy/k8s/README.md).
apiVersion: v1
kind: Secret
metadata:
  name: toolbox-env
  namespace: groceries
type: Opaque
stringData:
  # Cloud SQL / AlloyDB connection target (no password — IAM via Workload Identity)
  PG_PROJECT: PROJECT_ID
  PG_REGION: us-central1
  PG_INSTANCE: groceries-pg
  PG_DATABASE: grocery
  PG_APP_IAM_USER: "toolbox-gsa@PROJECT_ID.iam"     # IAM DB user (no password)
  # MongoDB Atlas (least-privilege user; keep the SRV string in a real secret)
  MONGO_URI: "mongodb+srv://toolbox_ro:[email protected]/?retryWrites=true"
  # OIDC issuer — Google Sign-In in production (swap authService to kind: google)
  OIDC_ISSUER: "https://accounts.google.com"
---
# The curated tools.yaml is delivered as its own Secret, created from the file:
#   kubectl -n groceries create secret generic toolbox-tools \
#     --from-file=tools.yaml=deploy/k8s/tools.yaml
# (deploy/k8s/tools.yaml is the GKE variant of toolbox/tools.yaml — same tools,
#  cloud-sql-postgres sources. See README.)
