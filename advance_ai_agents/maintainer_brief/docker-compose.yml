services:
  postgres:
    image: postgres:16-alpine
    container_name: maintainer-brief-db
    environment:
      POSTGRES_USER: brief
      POSTGRES_PASSWORD: brief
      POSTGRES_DB: maintainer_brief
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brief -d maintainer_brief"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
